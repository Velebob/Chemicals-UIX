<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="ribbon">
    <span id="title"></span>
    <button onclick="logout()">Salir</button>
</div>

<div class="scanner-bar">
    <input id="scanner" placeholder="Escanear lote...">
    <button onclick="openCamera()">📷</button>
</div>

<div class="content">

    <div id="inventory" class="inventory"></div>

    <div class="cart">
        <h3>Carrito</h3>
        <div id="cart"></div>
        <button onclick="clearCart()">Limpiar</button>
    </div>

</div>

<div class="actions">
    <button onclick="entrada()">Ingresar</button>
    <button onclick="salida()">Sacar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box"></div>
</div>

<!-- CAMERA -->
<div id="cameraModal" class="camera-modal">
    <div class="camera-box">
        <div id="scanner-container"></div>
        <button onclick="closeCamera()">Cerrar</button>
    </div>
</div>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/ui.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

<script>
initApp();
</script>

</body>
</html>
